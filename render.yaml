services:
  - type: web
    name: ultra-search-browser
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_LOCAL_EMBEDDINGS
        value: "false"
      - key: ENABLE_OCR
        value: "false"
      - key: SERPER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: SCRAPEGRAPHAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
